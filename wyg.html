<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velkaria Ve Veythorn</title>
  <link rel="stylesheet" href="style.css" />
  <link id="favicon" rel="icon" href="img/pen.ico" />
</head>

<body>
<canvas id="ashParticles" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:-1;"></canvas>
<div id="rose-container"></div>
  <div class="content-box">
    <h1>⛧ Wygląd ⛧</h1>
    <br>
    <h2>Velkaria: </h2>
    <div class="slider-container">
      <div class="slider">
        <img src="img/różankowa.png" class="slide active" alt="Postać 3" />
        <img src="img/131b60430cceb04fb20117eea011feaf.png" class="slide" alt="Postać 1" />
        <img src="img/lizu lizu.png" class="slide" alt="Postać 2" />
      </div>
      <div class="dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
      </div>
    </div>
    <br>
    <br> 
    <br>    
    <h2>Lilith: </h2>
    <div class="slider-container">
      <div class="slider">
        <img src="img/f1a5f94b9d18ac7499348c8ef75209e7.jpg" class="slide active" alt="Postać 3"/>
        <img src="img/2222.png" class="slide" alt="Postać 1" />
        <img src="img/Copilot_20260411_100428.png" class="slide" alt="Postać 2" />
      </div>
      <div class="dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
      </div>
    </div>

    <div class="back-button">
      <a href="index.html">⟵ Powrót</a>
    </div>
  </div>

  <script src="script.js"></script>
    <script>
      const sliders = document.querySelectorAll('.slider-container');

      sliders.forEach((sliderContainer) => {
        let currentSlide = 0;

        const slides = sliderContainer.querySelectorAll('.slide');
        const dots = sliderContainer.querySelectorAll('.dot');

        function showSlide(index) {
          slides[currentSlide].classList.remove('active');
          dots[currentSlide].classList.remove('active');

          currentSlide = index;

          slides[currentSlide].classList.add('active');
          dots[currentSlide].classList.add('active');
        }

        // przypisanie kliknięć do kropek
          dots.forEach((dot, index) => {
            dot.addEventListener('click', () => showSlide(index));
          });
      });
    </script>
</body>
</html>
